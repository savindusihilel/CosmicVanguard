name: Build and deploy Python app to Azure Web App - CosmicVanguard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          miniforge-variant: Miniforge3   # fast, lightweight conda
          activate-environment: ""        # we'll create our own below

      - name: Create conda environment in antenv/
        shell: bash -el {0}
        run: |
          conda env create -p ./antenv -f environment.yml
          # verify only one Intel OpenMP exists
          find antenv -name "libiomp5.so" | tee /dev/stderr | wc -l | xargs -I{} bash -c 'if [ {} -gt 1 ]; then echo "ERROR: Multiple libiomp5.so found!"; exit 1; fi'

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            # the pre‑built conda environment is included
            # (omit .git, __pycache__, etc. if you want)

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0CEF77DE08CD446CB8830A66D45F75BC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3802A987847E4634902BADC305723FCB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_47345C117F2148789F933AA4DB61CF5E }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'CosmicVanguard'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          startup-command: 'antenv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8000'