name: Build and deploy Python app to Azure Web App - CosmicVanguard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify no OpenMP conflict
        run: |
          source antenv/bin/activate
          python -c "
          import os
          os.environ['KMP_DUPLICATE_LIB_OK'] = 'TRUE'
          import torch; print('PyTorch:', torch.__version__)
          import tensorflow as tf; print('TensorFlow:', tf.__version__)
          print('Both loaded successfully — no OpenMP conflict')
          "

      - name: Zip artifact for deployment
        run: |
          zip release.zip ./* -r \
            -x ".git/*" \
            -x "__pycache__/*" \
            -x ".pytest_cache/*" \
            -x ".github/*"

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0CEF77DE08CD446CB8830A66D45F75BC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3802A987847E4634902BADC305723FCB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_47345C117F2148789F933AA4DB61CF5E }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'CosmicVanguard'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          startup-command: 'antenv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8000'