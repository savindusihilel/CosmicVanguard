name: Build and deploy Python app to Azure Web App - CosmicVanguard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          miniforge-variant: Miniforge3
          activate-environment: rp
          environment-file: environment.yml
          use-mamba: true

      - name: Verify single OpenMP runtime
        shell: bash -el {0}
        run: |
          conda activate rp
          echo "=== Checking for duplicate OpenMP runtimes ==="
          count=$(find $CONDA_PREFIX -name "libiomp5*.so" -o -name "libomp*.so" 2>/dev/null | tee /dev/stderr | wc -l)
          echo "Found $count OpenMP libraries"
          # Just warn, don't fail — pip's tensorflow-cpu may bundle one internally
          if [ "$count" -gt 2 ]; then
            echo "WARNING: Multiple OpenMP runtimes detected — review dependencies"
          fi

      - name: Create portable env in antenv/
        shell: bash -el {0}
        run: |
          conda activate rp
          conda pack -p $CONDA_PREFIX -o antenv.tar.gz --ignore-editable-packages
          mkdir -p antenv
          tar -xzf antenv.tar.gz -C antenv
          rm antenv.tar.gz
          # Fix up prefixes for portability
          source antenv/bin/activate
          conda-unpack 2>/dev/null || true

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !.git/**
            !__pycache__/**
            !.pytest_cache/**

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0CEF77DE08CD446CB8830A66D45F75BC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3802A987847E4634902BADC305723FCB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_47345C117F2148789F933AA4DB61CF5E }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'CosmicVanguard'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          startup-command: 'antenv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8000'