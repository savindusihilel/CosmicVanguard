name: rp
channels:
  - defaults
dependencies:
  - python=3.12
  - tensorflow-cpu
  - pytorch-cpu       # CPU-only PyTorch from defaults
  - numpy
  - scikit-learn
  - joblib
  - pandas
  - scipy
  - fastapi
  - uvicorn
  - pydantic
  - httpx
  - python-multipart
  - pip
  - pip:
      - nflows   # only pip‑only packages go here